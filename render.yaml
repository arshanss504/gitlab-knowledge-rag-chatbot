# Render Blueprint: add Redis in dashboard, set REDIS_URL and CORS_ORIGINS.

services:
  - type: web
    name: gitlab-rag-api
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_db
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: chroma
      mountPath: /app/chroma_db
      sizeGB: 1
